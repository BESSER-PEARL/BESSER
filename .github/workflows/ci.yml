name: CI

on:
  pull_request:
    branches: [master, development]
  push:
    branches: [master, development]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r besser/utilities/web_modeling_editor/backend/requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short --ignore=tests/generators/nn --ignore=tests/BUML/metamodel/nn -x

  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Check formatting
        run: ruff check besser/ --select E,W,F --ignore E501

  frontend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'besser/utilities/web_modeling_editor/frontend/package-lock.json'
      - name: Install dependencies
        working-directory: besser/utilities/web_modeling_editor/frontend
        run: npm ci
      - name: Lint
        working-directory: besser/utilities/web_modeling_editor/frontend/packages/webapp2
        run: npm run lint
      - name: Build
        working-directory: besser/utilities/web_modeling_editor/frontend/packages/webapp2
        run: npm run build
